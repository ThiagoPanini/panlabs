name: pr-checks

# Portão de qualidade antes do merge na main — o único gate deste repo solo.
# Dispara no push das branches de trabalho (inclui worktree/** geradas por
# agente). Quando todos os checks ficam verdes, open-pr abre o PR para a main.
# Merge autônomo no verde — o agente mergeia diretamente sem esperar operador
# (ADR-0014).
#
# CD: deploy.yml dispara no push à main e aciona a API do Coolify para buildar
# e subir o novo commit (ADR-0004). O Coolify clona o repo e builda o
# Dockerfile da raiz — não há build de imagem GHCR neste pipeline.

on:
  push:
    branches:
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
      - "refactor/**"
      - "test/**"
      - "ci/**"
      - "worktree/**"

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - name: lint (biome)
        run: npm run lint
      - name: typecheck (tsc)
        run: npm run typecheck
      - name: test (vitest)
        run: npm test
      - name: build (next)
        run: npm run build

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  open-pr:
    name: open-pr
    needs: [checks, security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Abrir PR para a main se ainda nao existir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$(gh pr list --head "$BRANCH" --base main --state open --json number --jq 'length')" -ne 0 ]; then
            echo "::notice::Ja existe PR aberto de $BRANCH para a main."
            exit 0
          fi

          git fetch --quiet origin main
          if [ "$(git rev-list --count FETCH_HEAD..HEAD)" -eq 0 ]; then
            echo "::notice::$BRANCH nao tem commits novos sobre a main."
            exit 0
          fi

          title="$(git log "FETCH_HEAD..HEAD" --pretty=%s | head -n1 || true)"
          [ -z "$title" ] && title="$(git log -1 --pretty=%s)"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$title" \
            --body "PR aberto automaticamente após checks verdes. Merge autônomo no verde — agente faz o merge diretamente sem esperar operador."

          echo "::notice::PR aberto: $BRANCH -> main"
